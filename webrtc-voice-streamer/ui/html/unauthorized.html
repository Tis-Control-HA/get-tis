<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebRTC Voice Streamer</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: '#1e293b',
            bg: '#0f172a',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="./ui/css/styles.css" />
</head>

<body
  class="min-h-screen flex flex-col w-full justify-center items-center text-center bg-slate-900 text-slate-100 selection:bg-sky-500/30 p-4">
  <div
    class="max-w-md w-full space-y-8 bg-slate-800/80 backdrop-blur-md rounded-2xl p-8 shadow-2xl border border-slate-700/50 transition-all duration-300 hover:border-slate-600/50">
    <div class="flex flex-col items-center justify-center space-y-6">
      <!-- Loading Spinner Container -->
      <div class="relative w-20 h-20 flex items-center justify-center">
        <!-- Outer Glowing Ring -->
        <div class="absolute inset-0 rounded-full border-4 border-sky-500/20 animate-pulse"></div>

        <!-- Rotating Gradient Ring -->
        <div
          class="absolute inset-0 rounded-full border-4 border-transparent border-t-sky-500 border-r-sky-400 animate-spin"
          style="animation-duration: 0.8s;"></div>

        <!-- Pulsing Inner Circle -->
        <div
          class="w-8 h-8 rounded-full bg-gradient-to-tr from-sky-500 to-indigo-500 shadow-lg shadow-sky-500/50 animate-ping opacity-75">
        </div>

        <!-- Static Inner Dot -->
        <div class="absolute w-4 h-4 rounded-full bg-sky-400 shadow-md"></div>
      </div>

      <!-- Status Badge -->
      <div
        class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-900/60 border border-slate-700/50 text-xs font-semibold text-slate-400 select-none">
        <span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
        Connecting to Home Assistant
      </div>
    </div>
  </div>
</body>

</html>
